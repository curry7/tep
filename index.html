<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露点温度计算对比</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 2rem 0; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 1.5rem; }
        .card-header { background-color: #2c3e50; color: white; font-weight: bold; }
        .result-box { 
            text-align: center; 
            padding: 1.2rem 0.5rem; 
            border-radius: 0.5rem; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-magnus { background-color: #d1ecf1; border: 1px solid #bee5eb; }
        .result-simple { background-color: #d4edda; border: 1px solid #c3e6cb; }
        .result-diff { background-color: #fff3cd; border: 1px solid #ffeeba; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .highlight-legend {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 193, 7, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #ffc107;
        }
        .highlight-dot {
            width: 12px;
            height: 12px;
            background-color: #ffc107;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0.3rem 0;
        }
        #chartError {
            display: none;
            text-align: center;
            padding: 2rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">露点温度计算方法对比</h2>
            <p class="text-muted">简易近似法 vs Magnus-Tetens法</p>
        </div>
        <div class="row">
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">输入参数</div>
                    <div class="card-body">
                        <form id="calcForm">
                            <div class="mb-3">
                                <label class="form-label">干球温度 T (℃)</label>
                                <input type="number" class="form-control" id="temperature" value="25" min="-40" max="100">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">相对湿度 RH (%)</label>
                                <input type="number" class="form-control" id="humidity" value="60" min="1" max="100">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">计算对比</button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">计算结果</div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="result-box result-magnus">
                                    <h6 class="fw-bold text-primary mb-0">Magnus法</h6>
                                    <div class="result-value text-primary" id="tdMagnus">--</div>
                                    <small>工业基准</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="result-box result-simple">
                                    <h6 class="fw-bold text-success mb-0">简易法</h6>
                                    <div class="result-value text-success" id="tdSimple">--</div>
                                    <small>快速估算</small>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="result-box result-diff">
                                    <h6 class="fw-bold text-warning mb-0">偏差</h6>
                                    <div class="result-value text-warning" id="tdDiff">--</div>
                                    <small id="riskTip">--</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>曲线对比</span>
                        <div class="highlight-legend">
                            <div class="highlight-dot"></div>
                            <small class="fw-bold">当前输入值</small>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="chartError">图表加载失败，请检查网络</div>
                        <div class="chart-container"><canvas id="comparisonChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 修复：放在 body 末尾，确保DOM加载完成再初始化图表 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script>
        function calcMagnus(T, RH) {
            const a = 17.27, b = 237.7;
            const rhRatio = Math.max(RH / 100, 0.001);
            const gamma = (a * T) / (b + T) + Math.log(rhRatio);
            return (b * gamma) / (a - gamma);
        }

        function calcSimple(T, RH) {
            return T + RH / 5 - 20;
        }

        let chart;

        // 延迟初始化，确保图表100%加载
        function safeInitChart() {
            if (typeof Chart === 'undefined') {
                setTimeout(safeInitChart, 300);
                return;
            }

            const ctx = document.getElementById('comparisonChart').getContext('2d');
            const rhRange = Array.from({length: 100}, (_, i) => i + 1);
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rhRange,
                    datasets: [
                        { 
                            label: 'Magnus法', 
                            data: rhRange.map(rh => calcMagnus(25, rh)), 
                            borderColor: '#0d6efd', 
                            borderWidth: 3, 
                            fill: false, 
                            tension: 0.1,
                            pointRadius: 0
                        },
                        { 
                            label: '简易法', 
                            data: rhRange.map(rh => calcSimple(25, rh)), 
                            borderColor: '#198754', 
                            borderWidth: 3, 
                            borderDash: [5,5], 
                            fill: false, 
                            tension: 0.1,
                            pointRadius: 0
                        },
                        {
                            label: 'M点',
                            data: [],
                            backgroundColor: '#ffc107',
                            borderColor: '#fff',
                            borderWidth: 2,
                            pointRadius: 10,
                            type: 'scatter',
                            order: 1
                        },
                        {
                            label: 'S点',
                            data: [],
                            backgroundColor: '#ffc107',
                            borderColor: '#fff',
                            borderWidth: 2,
                            pointRadius: 10,
                            type: 'scatter',
                            order: 1
                        }
                    ]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { filter: i => !i.text.includes('点') }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: '相对湿度 RH (%)' } },
                        y: { title: { display: true, text: '露点温度 Td (℃)' } }
                    }
                }
            });
        }

        // 计算并更新
        document.getElementById('calcForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const T = parseFloat(document.getElementById('temperature').value);
            const RH = parseFloat(document.getElementById('humidity').value);
            
            const tdM = calcMagnus(T, RH);
            const tdS = calcSimple(T, RH);
            const diff = tdS - tdM;
            
            document.getElementById('tdMagnus').textContent = tdM.toFixed(2) + ' ℃';
            document.getElementById('tdSimple').textContent = tdS.toFixed(2) + ' ℃';
            document.getElementById('tdDiff').textContent = diff.toFixed(2) + ' ℃';
            
            let riskTip = '✅ 精度极高';
            if (Math.abs(diff) > 0.5) riskTip = '⚠️ 精度良好';
            if (Math.abs(diff) > 1) riskTip = diff < -1 ? '❌ 高风险' : '⚠️ 高估';
            document.getElementById('riskTip').textContent = riskTip;

            if (chart) {
                const rhRange = Array.from({length:100},(_,i)=>i+1);
                chart.data.datasets[0].data = rhRange.map(r=>calcMagnus(T,r));
                chart.data.datasets[1].data = rhRange.map(r=>calcSimple(T,r));
                chart.data.datasets[2].data = [{x:RH, y:tdM}];
                chart.data.datasets[3].data = [{x:RH, y:tdS}];
                chart.update();
            }
        });

        // 页面加载完成后启动
        window.onload = function() {
            safeInitChart();
            setTimeout(()=>{
                document.getElementById('calcForm').dispatchEvent(new Event('submit'));
            }, 500);
        };
    </script>
</body>
</html>
